<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - BookNow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#2563eb', // blue-600
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Glassmorphism effect for decoration */
        .glass-bg {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen relative pt-24 pb-12">

    <!-- === BACKGROUND DECORATION === -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-100 rounded-full opacity-40 blur-3xl transform translate-x-1/3 -translate-y-1/4"></div>
        <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-indigo-100 rounded-full opacity-40 blur-3xl transform -translate-x-1/4 translate-y-1/4"></div>
    </div>

    <!-- === LOGO (Fixed Top-Left, 25px margin) === -->
    <div style="position: fixed; top: 25px; left: 25px; z-index: 100;" class="bg-white/90 backdrop-blur px-6 py-3 rounded-2xl shadow-sm border border-white/50 transition-transform hover:scale-105 cursor-pointer" onclick="window.location.href='index.html'">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center border border-blue-100">
                <i class="fa-solid fa-house-chimney gradient-icon text-2xl text-blue-600"></i>
            </div>
            <div class="flex flex-col justify-center">
                <span class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-blue-500 to-blue-700 leading-none">BookNow</span>
            </div>
        </div>
    </div>

    <!-- === MAIN CONTAINER === -->
    <div class="max-w-5xl mx-auto px-4 md:px-8 relative z-10">

        <!-- Breadcrumb -->
        <nav class="flex mb-8 text-sm text-gray-500 pl-2">
            <a href="index.html" class="hover:text-blue-600 transition-colors">Trang chủ</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800 font-medium">Hồ sơ cá nhân</span>
        </nav>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- LEFT COLUMN: Avatar & Quick Stats -->
            <div class="w-full lg:w-1/3 flex-shrink-0">
                <div class="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 text-center sticky top-28 overflow-hidden relative">
                    
                    <!-- Decorative Banner -->
                    <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
                    
                    <!-- Avatar -->
                    <div class="relative w-32 h-32 mx-auto -mt-4 mb-4">
                        <div class="w-32 h-32 rounded-full border-4 border-white shadow-md overflow-hidden bg-gray-200">
                            <img src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80" alt="Avatar" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute bottom-1 right-1 bg-green-500 w-5 h-5 rounded-full border-2 border-white" title="Đang hoạt động"></div>
                    </div>

                    <h2 class="text-2xl font-bold text-gray-900 mb-1">Nguyễn Văn A</h2>
                    <p class="text-blue-600 font-medium text-sm mb-6">Thành viên Vàng <i class="fa-solid fa-crown text-yellow-500 ml-1"></i></p>

                    <!-- Account Status Badge -->
                    <div class="bg-green-50 border border-green-100 rounded-xl py-2 px-4 inline-flex items-center gap-2 mb-8">
                        <span class="relative flex h-2.5 w-2.5">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                        </span>
                        <span class="text-green-700 font-bold text-sm">Tài khoản Hoạt động</span>
                    </div>

                    <!-- Quick Info -->
                    <div class="space-y-4 text-left border-t border-gray-100 pt-6">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Tham gia từ</span>
                            <span class="font-semibold text-gray-800">15/06/2023</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Lượt đặt phòng</span>
                            <span class="font-semibold text-gray-800">12</span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- RIGHT COLUMN: Detailed Info -->
            <div class="w-full lg:w-2/3">
                <div class="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 md:p-10">
                    
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                            <i class="fa-regular fa-id-card text-blue-500"></i> Thông tin cá nhân
                        </h3>
                        <!-- Mobile Edit Button (Visible only on small screens if needed, otherwise rely on bottom buttons) -->
                    </div>

                    <!-- Info Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-8">
                        
                        <!-- Full Name -->
                        <div class="group">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Họ và tên</label>
                            <div class="flex items-center gap-3 p-3 rounded-xl bg-gray-50 border border-transparent group-hover:border-blue-100 transition-colors">
                                <i class="fa-regular fa-user text-gray-400 w-5 text-center"></i>
                                <span class="font-semibold text-gray-800">Nguyễn Văn A</span>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="group">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Email</label>
                            <div class="flex items-center gap-3 p-3 rounded-xl bg-gray-50 border border-transparent group-hover:border-blue-100 transition-colors">
                                <i class="fa-regular fa-envelope text-gray-400 w-5 text-center"></i>
                                <span class="font-semibold text-gray-800">nguyenvana@email.com</span>
                            </div>
                        </div>

                        <!-- Phone -->
                        <div class="group">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Số điện thoại</label>
                            <div class="flex items-center gap-3 p-3 rounded-xl bg-gray-50 border border-transparent group-hover:border-blue-100 transition-colors">
                                <i class="fa-solid fa-phone text-gray-400 w-5 text-center"></i>
                                <span class="font-semibold text-gray-800">0987 *** ***</span>
                            </div>
                        </div>

                    </div>

                    <!-- Action Buttons Area -->
                    <div class="mt-12 pt-8 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                        
                        <!-- Update Profile Button -->
                        <button onclick="window.location.href='customer_profile_edit.html'" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-blue-500/30 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-pen-to-square"></i>
                            <span>Cập nhật thông tin</span>
                        </button>

                        <!-- Change Password Button -->
                        <button onclick="window.location.href='customer_change_password.html'" class="flex-1 bg-white border border-gray-200 text-gray-700 font-bold py-3.5 px-6 rounded-xl hover:bg-gray-50 hover:border-gray-300 hover:text-blue-600 transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-lock"></i>
                            <span>Đổi mật khẩu</span>
                        </button>

                    </div>

                </div>
            </div>

        </div>

    </div>

</body>
</html>
