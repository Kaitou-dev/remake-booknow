<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật hồ sơ - BookNow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#2563eb', // blue-600
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen relative pt-24 pb-12">

    <!-- === BACKGROUND DECORATION === -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-100 rounded-full opacity-40 blur-3xl transform translate-x-1/3 -translate-y-1/4"></div>
        <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-indigo-100 rounded-full opacity-40 blur-3xl transform -translate-x-1/4 translate-y-1/4"></div>
    </div>

    <!-- === LOGO (Fixed Top-Left, 25px margin) === -->
    <div style="position: fixed; top: 25px; left: 25px; z-index: 100;" class="bg-white/90 backdrop-blur px-6 py-3 rounded-2xl shadow-sm border border-white/50 transition-transform hover:scale-105 cursor-pointer" onclick="window.location.href='index.html'">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center border border-blue-100">
                <i class="fa-solid fa-house-chimney gradient-icon text-2xl text-blue-600"></i>
            </div>
            <div class="flex flex-col justify-center">
                <span class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-blue-500 to-blue-700 leading-none">BookNow</span>
            </div>
        </div>
    </div>

    <!-- === MAIN CONTAINER === -->
    <div class="max-w-5xl mx-auto px-4 md:px-8 relative z-10">

        <!-- Breadcrumb -->
        <nav class="flex mb-8 text-sm text-gray-500 pl-2">
            <a href="index.html" class="hover:text-blue-600 transition-colors">Trang chủ</a>
            <span class="mx-2">/</span>
            <a href="customer_profile_view.html" class="hover:text-blue-600 transition-colors">Hồ sơ cá nhân</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800 font-medium">Cập nhật thông tin</span>
        </nav>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- LEFT COLUMN: Avatar & Quick Info (Static Context) -->
            <div class="w-full lg:w-1/3 flex-shrink-0">
                <div class="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 text-center sticky top-28 overflow-hidden relative opacity-90 grayscale-[0.2]">
                    
                    <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-gray-400 to-gray-500"></div>
                    
                    <!-- Avatar -->
                    <div class="relative w-32 h-32 mx-auto -mt-4 mb-4">
                        <div class="w-32 h-32 rounded-full border-4 border-white shadow-md overflow-hidden bg-gray-200">
                            <img src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80" alt="Avatar" class="w-full h-full object-cover">
                        </div>
                        <!-- Camera Icon Overlay -->
                        <div class="absolute bottom-0 right-0 bg-white w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center text-gray-500 cursor-pointer hover:text-blue-600 hover:border-blue-300 transition-all shadow-sm">
                            <i class="fa-solid fa-camera text-xs"></i>
                        </div>
                    </div>

                    <h2 class="text-2xl font-bold text-gray-900 mb-1">Nguyễn Văn A</h2>
                    <p class="text-gray-500 font-medium text-sm">Đang chỉnh sửa...</p>

                </div>
            </div>

            <!-- RIGHT COLUMN: Edit Form -->
            <div class="w-full lg:w-2/3">
                <div class="bg-white rounded-3xl shadow-lg border border-blue-100 p-8 md:p-10 relative overflow-hidden">
                    
                    <!-- Decorative Top Line -->
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-400 to-blue-600"></div>

                    <div class="mb-8">
                        <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                            <i class="fa-solid fa-pen-to-square text-blue-500"></i> Cập nhật thông tin
                        </h3>
                        <p class="text-sm text-gray-500 mt-1">Vui lòng nhập thông tin chính xác để chúng tôi phục vụ bạn tốt hơn.</p>
                    </div>

                    <!-- Form -->
                    <form id="profileForm" onsubmit="return false;" class="space-y-6">
                        
                        <!-- Full Name (Editable) -->
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2" for="fullName">
                                Họ và tên <span class="text-red-500">*</span>
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                    <i class="fa-regular fa-user"></i>
                                </div>
                                <input type="text" id="fullName" value="Nguyễn Văn A" class="w-full pl-11 pr-4 py-3 bg-white border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block transition-all" placeholder="Nhập họ tên của bạn">
                            </div>
                            <p id="error-fullName" class="text-red-500 text-xs mt-1 hidden"><i class="fa-solid fa-circle-exclamation mr-1"></i> Họ tên không được để trống</p>
                        </div>

                        <!-- Email (Read-only) -->
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">
                                Email <span class="text-gray-300 font-normal">(Không thể thay đổi)</span>
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                    <i class="fa-regular fa-envelope"></i>
                                </div>
                                <input type="email" value="nguyenvana@email.com" readonly class="w-full pl-11 pr-4 py-3 bg-gray-100 border border-gray-200 text-gray-500 text-sm rounded-xl cursor-not-allowed select-none">
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-gray-400">
                                    <i class="fa-solid fa-lock text-xs"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Phone (Editable) -->
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2" for="phoneNumber">
                                Số điện thoại <span class="text-red-500">*</span>
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                    <i class="fa-solid fa-phone"></i>
                                </div>
                                <input type="tel" id="phoneNumber" value="0987654321" class="w-full pl-11 pr-4 py-3 bg-white border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block transition-all" placeholder="Nhập số điện thoại">
                            </div>
                            <p id="error-phone" class="text-red-500 text-xs mt-1 hidden"><i class="fa-solid fa-circle-exclamation mr-1"></i> Số điện thoại không đúng định dạng (10 số)</p>
                        </div>

                        <!-- Action Buttons -->
                        <div class="pt-6 border-t border-gray-100 flex flex-col-reverse sm:flex-row gap-4">
                            
                            <!-- Cancel Button -->
                            <button type="button" onclick="window.location.href='customer_profile_view.html'" class="flex-1 bg-white border border-gray-300 text-gray-600 font-bold py-3.5 px-6 rounded-xl hover:bg-gray-50 hover:text-gray-800 transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-xmark"></i>
                                <span>Hủy bỏ</span>
                            </button>

                            <!-- Save Button -->
                            <button type="button" onclick="saveProfile()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-blue-500/30 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2">
                                <i class="fa-solid fa-floppy-disk"></i>
                                <span>Lưu thay đổi</span>
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>

    </div>

    <!-- Script for Validation & Interaction -->
    <script>
        function saveProfile() {
            // Elements
            const fullNameInput = document.getElementById('fullName');
            const phoneInput = document.getElementById('phoneNumber');
            const errorName = document.getElementById('error-fullName');
            const errorPhone = document.getElementById('error-phone');
            const saveBtn = document.querySelector('button[onclick="saveProfile()"]');

            // Reset errors
            fullNameInput.classList.remove('border-red-500', 'bg-red-50');
            phoneInput.classList.remove('border-red-500', 'bg-red-50');
            errorName.classList.add('hidden');
            errorPhone.classList.add('hidden');

            let isValid = true;

            // Validate Name
            if (fullNameInput.value.trim() === '') {
                fullNameInput.classList.add('border-red-500', 'bg-red-50');
                errorName.classList.remove('hidden');
                isValid = false;
            }

            // Validate Phone (VN Format: starts with 0, 10 digits)
            const phoneRegex = /(84|0[3|5|7|8|9])+([0-9]{8})\b/g;
            if (!phoneRegex.test(phoneInput.value.replace(/\s/g, ''))) {
                phoneInput.classList.add('border-red-500', 'bg-red-50');
                errorPhone.classList.remove('hidden');
                isValid = false;
            }

            if (!isValid) return;

            // Logic Loading & Save
            const originalContent = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Đang lưu...';
            saveBtn.classList.add('opacity-75', 'cursor-wait');

            setTimeout(() => {
                alert('Cập nhật thông tin thành công!');
                window.location.href = 'customer_profile_view.html';
            }, 1000);
        }
    </script>

</body>
</html>
