<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <!-- Staff/Admin Sidebar Fragment -->
    <aside th:fragment="sidebar(activePage)" id="sidebar" class="sidebar fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 z-50 transform -translate-x-full lg:translate-x-0 pt-28 overflow-y-auto no-scrollbar">

        <!-- Navigation Links -->
        <nav class="px-4 space-y-2">
            <!-- Dashboard -->
            <a th:href="@{/staff/dashboard}"
               th:classappend="${activePage == 'dashboard'} ? 'bg-blue-50 text-blue-600 shadow-sm ring-1 ring-black/5' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors">
                <i class="fa-solid fa-chart-line w-5"></i>
                Bảng điều khiển
            </a>

            <!-- Bookings -->
            <a th:href="@{/staff/bookings}"
               th:classappend="${activePage == 'bookings'} ? 'bg-blue-50 text-blue-600 shadow-sm ring-1 ring-black/5' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors">
                <i class="fa-regular fa-calendar-check w-5"></i>
                Đơn đặt phòng
            </a>

            <!-- Rooms -->
            <a th:href="@{/staff/rooms}"
               th:classappend="${activePage == 'rooms'} ? 'bg-blue-50 text-blue-600 shadow-sm ring-1 ring-black/5' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors">
                <i class="fa-solid fa-door-open w-5"></i>
                Phòng
            </a>

            <!-- Feedback -->
            <a th:href="@{/staff/feedback}"
               th:classappend="${activePage == 'feedback'} ? 'bg-blue-50 text-blue-600 shadow-sm ring-1 ring-black/5' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors">
                <i class="fa-regular fa-comment-dots w-5"></i>
                Phản hồi khách hàng
            </a>

            <!-- Admin-only: Staff Management -->
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin/staff}"
               th:classappend="${activePage == 'staff-management'} ? 'bg-blue-50 text-blue-600 shadow-sm ring-1 ring-black/5' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors">
                <i class="fa-solid fa-users-gear w-5"></i>
                Quản lý nhân viên
            </a>

            <!-- Admin-only: Housekeeping -->
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin/housekeeping}"
               th:classappend="${activePage == 'housekeeping'} ? 'bg-blue-50 text-blue-600 shadow-sm ring-1 ring-black/5' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-colors">
                <i class="fa-solid fa-broom w-5"></i>
                Housekeeping
            </a>
        </nav>

        <!-- Logout at Bottom -->
        <div class="absolute bottom-0 w-full p-4 border-t border-gray-100 bg-white">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg font-medium transition-colors w-full text-left">
                    <i class="fa-solid fa-arrow-right-from-bracket w-5"></i>
                    Đăng xuất
                </button>
            </form>
        </div>
    </aside>
</body>
</html>
