<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <!-- Housekeeping Header Fragment -->
    <header th:fragment="header" class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">Housekeeping Dashboard</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm">Welcome, <span sec:authentication="name">Nguyen Van A</span></span>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit" class="text-sm bg-blue-700 px-3 py-1 rounded hover:bg-blue-800">Logout</button>
                </form>
            </div>
        </div>
    </header>
</body>
</html>
