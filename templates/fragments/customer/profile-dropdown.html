<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <!-- Profile Dropdown Fragment -->
    <div th:fragment="profile-dropdown(transparent)" class="relative">
        <!-- Profile Button -->
        <button id="profileBtn" class="flex items-center gap-3 focus:outline-none group">
            <div class="text-right hidden sm:block">
                <p th:class="${transparent} ? 'text-xs font-bold text-white group-hover:text-blue-100 transition-colors drop-shadow-sm' : 'text-xs font-bold text-gray-800 group-hover:text-blue-600'"
                   sec:authentication="name">Nguyễn Văn A</p>
                <p th:class="${transparent} ? 'text-[10px] text-gray-200 group-hover:text-white transition-colors' : 'text-[10px] text-gray-500'">
                    Khách hàng
                </p>
            </div>
            <div th:class="${transparent} ? 'w-10 h-10 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center text-white border border-white/50 shadow-sm group-hover:bg-white group-hover:text-blue-600 transition-all' : 'w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 border-2 border-blue-200 shadow-sm'">
                <i class="fa-solid fa-user"></i>
            </div>
        </button>

        <!-- Dropdown Menu -->
        <div id="profileDropdown"
             class="absolute right-0 mt-3 w-56 bg-white rounded-xl shadow-lg border border-gray-100 py-2 dropdown-menu dropdown-hidden z-50">
            <div class="px-4 py-3 border-b border-gray-100">
                <p class="text-sm font-medium text-gray-900">Tài khoản của tôi</p>
                <p class="text-xs text-gray-500 truncate" sec:authentication="name">email@example.com</p>
            </div>
            <ul class="py-1">
                <li>
                    <a th:href="@{/customer/profile}"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-blue-600">
                        <i class="fa-regular fa-id-card mr-2 w-4"></i> Hồ sơ của tôi
                    </a>
                </li>
                <li>
                    <a th:href="@{/customer/booking-history}"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-blue-600">
                        <i class="fa-solid fa-clock-rotate-left mr-2 w-4"></i> Lịch sử đặt phòng
                    </a>
                </li>
            </ul>
            <div class="border-t border-gray-100 mt-1 pt-1">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                        <i class="fa-solid fa-arrow-right-from-bracket mr-2 w-4"></i> Đăng xuất
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
