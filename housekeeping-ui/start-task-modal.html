<!-- Start Task Modal -->
<!-- Include this modal in task-detail.html or task pages -->
<!-- Show with: document.getElementById('startTaskModal').classList.remove('hidden') -->

<div id="startTaskModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg max-w-md w-full mx-4">
        <!-- Modal Header -->
        <div class="bg-blue-600 text-white px-6 py-4 rounded-t-lg flex items-center gap-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h3 class="text-lg font-semibold">Start Cleaning Task</h3>
        </div>

        <!-- Modal Body -->
        <div class="px-6 py-4">
            <div class="mb-4">
                <h4 class="font-semibold text-gray-800 mb-2">Task #1025 - Room 205</h4>
                <p class="text-sm text-gray-600">Standard Single Room</p>
            </div>

            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                <p class="text-sm text-gray-700 mb-2">
                    <strong class="text-blue-900">Before you start:</strong>
                </p>
                <ul class="text-sm text-gray-700 space-y-1 list-disc list-inside">
                    <li>Make sure you have all cleaning supplies</li>
                    <li>Check the room for any special notes or damage</li>
                    <li>Ensure proper ventilation during cleaning</li>
                </ul>
            </div>

            <div class="border-t pt-4">
                <label class="flex items-start gap-3">
                    <input type="checkbox" id="confirmStartTask" class="mt-1 h-4 w-4 text-blue-600 rounded">
                    <span class="text-sm text-gray-700">I'm ready to start the cleaning task and have all necessary supplies</span>
                </label>
            </div>
        </div>

        <!-- Modal Footer -->
        <div class="bg-gray-50 px-6 py-4 rounded-b-lg flex gap-3 border-t">
            <button type="button" onclick="document.getElementById('startTaskModal').classList.add('hidden')" class="flex-1 bg-gray-300 text-gray-700 px-4 py-2 rounded font-medium hover:bg-gray-400 transition">
                Cancel
            </button>
            <button type="button" id="confirmStartBtn" disabled class="flex-1 bg-blue-600 text-white px-4 py-2 rounded font-medium hover:bg-blue-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed">
                Start Task
            </button>
        </div>
    </div>
</div>

<script>
    // Enable/disable confirm button based on checkbox
    const confirmCheckbox = document.getElementById('confirmStartTask');
    const confirmBtn = document.getElementById('confirmStartBtn');
    
    if (confirmCheckbox) {
        confirmCheckbox.addEventListener('change', function() {
            confirmBtn.disabled = !this.checked;
        });

        confirmBtn.addEventListener('click', function() {
            // Submit form or make API call to start task
            // Change status: ASSIGNED → IN_PROGRESS
            // Set started_at timestamp
            console.log('Starting task...');
            // TODO: Implement actual start task logic
            document.getElementById('startTaskModal').classList.add('hidden');
        });
    }
</script>
