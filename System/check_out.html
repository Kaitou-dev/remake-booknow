<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận Trả phòng - BookNow Kiosk</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#2563eb', // blue-600
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Ẩn thanh cuộn */
        body {
            overflow: hidden; 
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen flex flex-col justify-center items-center relative overflow-hidden">

    <!-- === BACKGROUND DECORATION === -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-orange-200 rounded-full opacity-30 blur-3xl"></div>
        <div class="absolute bottom-0 left-0 w-80 h-80 bg-blue-300 rounded-full opacity-20 blur-3xl"></div>
    </div>

    <!-- === LOGO (Fixed Top-Left, 25px margin) === -->
    <div style="position: fixed; top: 25px; left: 25px; z-index: 100;" class="bg-white/90 backdrop-blur px-6 py-3 rounded-2xl shadow-sm border border-white/50">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center border border-blue-100">
                <i class="fa-solid fa-house-chimney gradient-icon text-2xl text-blue-600"></i>
            </div>
            <div class="flex flex-col justify-center">
                <span class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-blue-500 to-blue-700 leading-none">BookNow</span>
            </div>
        </div>
    </div>

    <!-- === MAIN KIOSK CARD === -->
    <div class="w-full max-w-xl px-4 relative z-10 text-center">
        
        <div class="bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-14 border border-white/60 relative overflow-hidden">
            
            <!-- Check-out Icon -->
            <div class="w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-8 text-orange-600 shadow-sm border border-orange-200">
                <i class="fa-solid fa-person-walking-luggage text-4xl ml-2"></i>
            </div>

            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-3">Xác nhận trả phòng</h1>
            <p class="text-gray-500 text-lg mb-8">
                Bạn đang thực hiện thủ tục trả phòng cho:
            </p>

            <!-- Booking Summary Box -->
            <div class="bg-gray-50 rounded-3xl p-6 border border-gray-200 mb-8 text-left relative overflow-hidden">
                <div class="absolute top-0 right-0 w-20 h-20 bg-blue-100 rounded-bl-full opacity-50"></div>
                
                <div class="flex items-center justify-between mb-4 relative z-10">
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wide">Số phòng</p>
                        <p class="text-2xl font-black text-blue-600">P.101</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wide">Mã Booking</p>
                        <p class="text-lg font-mono font-bold text-gray-700">#BK88921</p>
                    </div>
                </div>
                <div class="border-t border-gray-200 pt-3 relative z-10">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wide">Khách hàng</p>
                    <p class="text-lg font-bold text-gray-800">Nguyễn Văn A</p>
                </div>
            </div>

            <!-- Reminder Checklist -->
            <div class="mb-10 text-left">
                <p class="text-sm font-bold text-gray-500 uppercase mb-3 ml-1">Vui lòng kiểm tra:</p>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 p-3 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-200 transition-colors cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <span class="text-gray-700 font-medium group-hover:text-blue-700">Tôi đã kiểm tra kỹ hành lý tư trang</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-200 transition-colors cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <span class="text-gray-700 font-medium group-hover:text-blue-700">Tôi đã trả lại thẻ từ/chìa khóa phòng</span>
                    </label>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-4">
                <button onclick="confirmCheckout()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold py-4 rounded-2xl shadow-xl shadow-blue-500/30 transition-all transform hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-3 group">
                    <span>Xác nhận Check-out</span>
                    <i class="fa-solid fa-arrow-right-from-bracket group-hover:translate-x-1 transition-transform"></i>
                </button>

                <button onclick="window.history.back()" class="w-full bg-white border-2 border-gray-200 text-gray-600 text-lg font-bold py-4 rounded-2xl hover:bg-gray-50 transition-all">
                    Quay lại
                </button>
            </div>

        </div>

    </div>

    <!-- === SCRIPT LOGIC === -->
    <script>
        function confirmCheckout() {
            // Check checkboxes
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            let allChecked = true;
            checkboxes.forEach(cb => {
                if (!cb.checked) allChecked = false;
            });

            if (!allChecked) {
                alert("Vui lòng xác nhận các mục kiểm tra trước khi trả phòng.");
                return;
            }

            const btn = document.querySelector('button[onclick="confirmCheckout()"]');
            const originalContent = btn.innerHTML;
            
            // Loading State
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Đang xử lý...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btn.disabled = true;

            setTimeout(() => {
                // Success message
                alert("Trả phòng thành công! Cảm ơn quý khách đã sử dụng dịch vụ.");
                window.location.href = 'index.html'; // Redirect to home/welcome screen
            }, 2000);
        }
    </script>
</body>
</html>
