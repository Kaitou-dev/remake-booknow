<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang xác thực - BookNow Kiosk</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#2563eb', // blue-600
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Ẩn thanh cuộn */
        body {
            overflow: hidden; 
        }
        /* Custom Loader Animation */
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen flex flex-col justify-center items-center relative overflow-hidden">

    <!-- === BACKGROUND DECORATION === -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-200 rounded-full opacity-30 blur-3xl"></div>
        <div class="absolute bottom-0 left-0 w-80 h-80 bg-blue-300 rounded-full opacity-20 blur-3xl"></div>
    </div>

    <!-- === LOGO (Fixed Top-Left, 25px margin) === -->
    <div style="position: fixed; top: 25px; left: 25px; z-index: 100;" class="bg-white/90 backdrop-blur px-6 py-3 rounded-2xl shadow-sm border border-white/50">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center border border-blue-100">
                <i class="fa-solid fa-house-chimney gradient-icon text-2xl text-blue-600"></i>
            </div>
            <div class="flex flex-col justify-center">
                <span class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-blue-500 to-blue-700 leading-none">BookNow</span>
            </div>
        </div>
    </div>

    <!-- === MAIN CONTENT === -->
    <div class="w-full max-w-lg px-4 relative z-10 text-center">
        
        <div class="bg-white/80 backdrop-blur-md rounded-[2.5rem] shadow-2xl p-12 border border-white/60 relative">
            
            <!-- Loading Spinner Container -->
            <div class="relative w-32 h-32 mx-auto mb-10">
                <!-- Outer Ring -->
                <div class="absolute inset-0 border-4 border-blue-100 rounded-full"></div>
                <!-- Spinning Ring -->
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-32 w-32 absolute inset-0"></div>
                <!-- Center Icon -->
                <div class="absolute inset-0 flex items-center justify-center text-blue-500 animate-pulse">
                    <i class="fa-solid fa-user-shield text-4xl"></i>
                </div>
            </div>

            <!-- Status Text -->
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 mb-4 animate-pulse">
                Đang xác thực danh tính...
            </h1>
            
            <p class="text-gray-500 text-lg mb-8 leading-relaxed">
                Hệ thống đang đối chiếu video của bạn với hồ sơ đăng ký. Vui lòng chờ trong giây lát.
            </p>

            <!-- Progress Steps (Visual only) -->
            <div class="flex justify-center items-center gap-2 mb-4">
                <span class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0s"></span>
                <span class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                <span class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
            </div>

            <p class="text-sm text-gray-400 font-medium" id="status-detail">
                Đang tải dữ liệu lên máy chủ...
            </p>

        </div>

        <!-- Help Info -->
        <div class="mt-8 text-gray-400 text-sm">
            <p>Mã phiên giao dịch: <span class="font-mono text-gray-600">#TRX-88921-VERIFY</span></p>
        </div>

    </div>

    <!-- === SCRIPT LOGIC === -->
    <script>
        // Simulate progress updates
        const statusText = document.getElementById('status-detail');
        const steps = [
            "Đang phân tích khuôn mặt...",
            "Đang kiểm tra giấy tờ tùy thân...",
            "Đang đồng bộ hóa dữ liệu...",
            "Xác thực hoàn tất!"
        ];
        
        let stepIndex = 0;

        // Change status text every 1.5 seconds
        const statusInterval = setInterval(() => {
            if (stepIndex < steps.length) {
                statusText.textContent = steps[stepIndex];
                statusText.classList.add('animate-pulse');
                setTimeout(() => statusText.classList.remove('animate-pulse'), 500);
                stepIndex++;
            } else {
                clearInterval(statusInterval);
                finishVerification();
            }
        }, 1500);

        function finishVerification() {
            setTimeout(() => {
                // Redirect to success page (simulated)
                // In a real app: window.location.href = 'checkin_success.html';
                
                // For demo visualization:
                const mainContent = document.querySelector('.bg-white\\/80');
                mainContent.innerHTML = `
                    <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 text-green-600 animate-bounce">
                        <i class="fa-solid fa-check text-5xl"></i>
                    </div>
                    <h1 class="text-3xl font-extrabold text-gray-900 mb-4">Thành công!</h1>
                    <p class="text-gray-500 text-lg">Danh tính của bạn đã được xác thực.</p>
                    <p class="text-sm text-gray-400 mt-4">Đang chuyển hướng...</p>
                `;
                
                // Auto redirect after showing success message
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }, 500);
        }
    </script>
</body>
</html>
